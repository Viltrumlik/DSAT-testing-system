openapi: 3.0.3
info:
  title: MasterSAT LMS API
  version: 1.0.0
paths:
  /api/access/grant/:
    post:
      operationId: access_grant_create
      description: |-
        POST /api/access/grant/
        Body: { "userId": <int>, "subject": "math"|"english", "classroomId": <int|null> }
      tags:
      - access
      responses:
        '200':
          description: No response body
  /api/assessments/admin/attempts/{attempt_id}/:
    get:
      operationId: assessments_admin_attempts_retrieve
      parameters:
      - in: path
        name: attempt_id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '200':
          description: No response body
  /api/assessments/admin/attempts/{attempt_id}/force-grade/:
    post:
      operationId: assessments_admin_attempts_force_grade_create
      parameters:
      - in: path
        name: attempt_id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '200':
          description: No response body
  /api/assessments/admin/attempts/{attempt_id}/requeue/:
    post:
      operationId: assessments_admin_attempts_requeue_create
      parameters:
      - in: path
        name: attempt_id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '200':
          description: No response body
  /api/assessments/admin/builder/telemetry/:
    post:
      operationId: assessments_admin_builder_telemetry_create
      description: |-
        Minimal telemetry ingestion endpoint for questions-console builder recovery events.
        Best-effort counters only (Prometheus-exposed via assessments homework metrics endpoint).
      tags:
      - assessments
      responses:
        '200':
          description: No response body
  /api/assessments/admin/grading/metrics/:
    get:
      operationId: assessments_admin_grading_metrics_retrieve
      description: |-
        DB-derived grading metrics (broker-agnostic):
        - "queue size" approximated by pending submitted attempts
        - latency measured from submitted_at -> result.graded_at
      tags:
      - assessments
      responses:
        '200':
          description: No response body
  /api/assessments/admin/grading/metrics/prometheus/:
    get:
      operationId: assessments_admin_grading_metrics_prometheus_retrieve
      description: |-
        Prometheus scrape endpoint for grading/worker gauges.
        Keep it dependency-free (mirrors realtime.prometheus pattern).
      tags:
      - assessments
      responses:
        '200':
          description: No response body
  /api/assessments/admin/homework/metrics/prometheus/:
    get:
      operationId: assessments_admin_homework_metrics_prometheus_retrieve
      description: |-
        Prometheus scrape endpoint for homework integrity counters.
        Keep it dependency-free (mirrors other prometheus endpoints).
      tags:
      - assessments
      responses:
        '200':
          description: No response body
  /api/assessments/admin/questions/{id}/:
    patch:
      operationId: assessments_admin_questions_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '200':
          description: No response body
    delete:
      operationId: assessments_admin_questions_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '204':
          description: No response body
  /api/assessments/admin/sets/:
    get:
      operationId: assessments_admin_sets_retrieve
      tags:
      - assessments
      responses:
        '200':
          description: No response body
    post:
      operationId: assessments_admin_sets_create
      tags:
      - assessments
      responses:
        '200':
          description: No response body
  /api/assessments/admin/sets/{id}/:
    get:
      operationId: assessments_admin_sets_retrieve_2
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '200':
          description: No response body
    patch:
      operationId: assessments_admin_sets_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '200':
          description: No response body
    delete:
      operationId: assessments_admin_sets_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '204':
          description: No response body
  /api/assessments/admin/sets/{set_pk}/questions/:
    post:
      operationId: assessments_admin_sets_questions_create
      parameters:
      - in: path
        name: set_pk
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '200':
          description: No response body
  /api/assessments/attempts/{attempt_id}/bundle/:
    get:
      operationId: assessments_attempts_bundle_retrieve
      description: |-
        Student-facing attempt bootstrap: return attempt + sanitized question list
        (no correct answers), ordered by the per-attempt shuffle.
      summary: Attempt bundle (attempt + set + questions)
      parameters:
      - in: path
        name: attempt_id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentAttemptBundleResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssessmentDetail'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssessmentDetail'
          description: ''
  /api/assessments/attempts/abandon/:
    post:
      operationId: assessments_attempts_abandon_create
      tags:
      - assessments
      responses:
        '200':
          description: No response body
  /api/assessments/attempts/answer/:
    post:
      operationId: assessments_attempts_answer_create
      summary: Save answer for one question
      tags:
      - assessments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveAnswer'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SaveAnswer'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SaveAnswer'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveAnswerStored'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssessmentDetail'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssessmentDetail'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveAnswerStaleWrite'
          description: ''
        '410':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssessmentDetail'
          description: ''
  /api/assessments/attempts/start/:
    post:
      operationId: assessments_attempts_start_create
      summary: Start or resume attempt
      tags:
      - assessments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartAttempt'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/StartAttempt'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StartAttempt'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentAttempt'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssessmentDetail'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssessmentDetail'
          description: ''
  /api/assessments/attempts/submit/:
    post:
      operationId: assessments_attempts_submit_create
      summary: Submit attempt for grading
      tags:
      - assessments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitAttempt'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SubmitAttempt'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SubmitAttempt'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentSubmitCompleteResponse'
          description: ''
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentSubmitQueuedResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentSubmitBadRequestResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssessmentDetail'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentSnapshotConflictResponse'
          description: ''
        '410':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssessmentDetail'
          description: ''
  /api/assessments/homework/{assignment_id}/my-result/:
    get:
      operationId: assessments_homework_my_result_retrieve
      description: |-
        Convenience endpoint for the homework page: given a class assignment id, return the
        student's latest attempt/result for that assessment homework.
      summary: My latest attempt and result for assignment
      parameters:
      - in: path
        name: assignment_id
        schema:
          type: integer
        required: true
      tags:
      - assessments
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentMyResultResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssessmentDetail'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiAssessmentDetail'
          description: ''
  /api/assessments/homework/assign/:
    post:
      operationId: assessments_homework_assign_create
      description: |-
        Teacher assigns an AssessmentSet into a classroom.
        Creates a linked `classes.Assignment` so it appears in the normal homework feed.
      tags:
      - assessments
      responses:
        '200':
          description: No response body
  /api/auth/client-telemetry/:
    post:
      operationId: auth_client_telemetry_create
      description: |-
        Best-effort batch sink for SPA auth concurrency telemetry (logs + Prometheus-friendly counters).

        Responses are deliberately tiny; ingestion is gated by Api CSRF middleware for /api/auth/*.
        Payload is aggregates + recent client events — no persisted PII requirement.
      tags:
      - auth
      responses:
        '200':
          description: No response body
  /api/auth/csrf/:
    get:
      operationId: auth_csrf_retrieve
      description: Issue a CSRF cookie (csrftoken) for SPA clients.
      tags:
      - auth
      responses:
        '200':
          description: No response body
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: |-
        Browser auth: set HttpOnly cookies for access+refresh.
        Response body omits raw tokens to avoid JS-readable auth.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MyTokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MyTokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MyTokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyTokenObtainPair'
          description: ''
  /api/auth/logout/:
    post:
      operationId: auth_logout_create
      description: Clear cookies and revoke the current refresh token (best-effort).
      tags:
      - auth
      responses:
        '200':
          description: No response body
  /api/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: Refresh using HttpOnly refresh cookie; sets new HttpOnly access
        cookie.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/auth/sessions/:
    get:
      operationId: auth_sessions_retrieve
      tags:
      - auth
      responses:
        '200':
          description: No response body
  /api/auth/sessions/{session_id}/revoke/:
    post:
      operationId: auth_sessions_revoke_create
      parameters:
      - in: path
        name: session_id
        schema:
          type: integer
        required: true
      tags:
      - auth
      responses:
        '200':
          description: No response body
  /api/auth/sessions/revoke_all/:
    post:
      operationId: auth_sessions_revoke_all_create
      tags:
      - auth
      responses:
        '200':
          description: No response body
  /api/classes/:
    get:
      operationId: classes_list
      description: |-
        - List: classes the current user is a member of
        - Create: admin only (creates admin membership for creator)
      tags:
      - classes
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Classroom'
          description: ''
    post:
      operationId: classes_create
      description: |-
        - List: classes the current user is a member of
        - Create: admin only (creates admin membership for creator)
      tags:
      - classes
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassroomCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ClassroomCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ClassroomCreate'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassroomCreate'
          description: ''
  /api/classes/{classroom_pk}/assignments/:
    get:
      operationId: classes_assignments_list
      description: Fail closed with 403 when classroom exists but the user is not
        a member (no silent empty lists).
      parameters:
      - in: path
        name: classroom_pk
        schema:
          type: integer
        required: true
      tags:
      - classes
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Assignment'
          description: ''
    post:
      operationId: classes_assignments_create
      description: Fail closed with 403 when classroom exists but the user is not
        a member (no silent empty lists).
      parameters:
      - in: path
        name: classroom_pk
        schema:
          type: integer
        required: true
      tags:
      - classes
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Assignment'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Assignment'
          application/json:
            schema:
              $ref: '#/components/schemas/Assignment'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
          description: ''
  /api/classes/{classroom_pk}/assignments/{id}/:
    get:
      operationId: classes_assignments_retrieve
      description: Fail closed with 403 when classroom exists but the user is not
        a member (no silent empty lists).
      parameters:
      - in: path
        name: classroom_pk
        schema:
          type: integer
        required: true
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - classes
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
          description: ''
    put:
      operationId: classes_assignments_update
      description: Fail closed with 403 when classroom exists but the user is not
        a member (no silent empty lists).
      parameters:
      - in: path
        name: classroom_pk
        schema:
          type: integer
        required: true
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - classes
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Assignment'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Assignment'
          application/json:
            schema:
              $ref: '#/components/schemas/Assignment'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
          description: ''
    patch:
      operationId: classes_assignments_partial_update
      description: Fail closed with 403 when classroom exists but the user is not
        a member (no silent empty lists).
      parameters:
      - in: path
        name: classroom_pk
        schema:
          type: integer
        required: true
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - classes
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAssignment'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAssignment'
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAssignment'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
          description: ''
    delete:
      operationId: classes_assignments_destroy
      description: Fail closed with 403 when classroom exists but the user is not
        a member (no silent empty lists).
      parameters:
      - in: path
        name: classroom_pk
        schema:
          type: integer
        required: true
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - classes
      responses:
        '204':
          description: No response body
  /api/classes/{classroom_pk}/assignments/{id}/my-submission/:
    get:
      operationId: classes_assignments_my_submission_retrieve
      description: Fail closed with 403 when classroom exists but the user is not
        a member (no silent empty lists).
      parameters:
      - in: path
        name: classroom_pk
        schema:
          type: integer
        required: true
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - classes
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
          description: ''
  /api/classes/{classroom_pk}/assignments/{id}/submissions/:
    get:
      operationId: classes_assignments_submissions_retrieve
      description: Fail closed with 403 when classroom exists but the user is not
        a member (no silent empty lists).
      parameters:
      - in: path
        name: classroom_pk
        schema:
          type: integer
        required: true
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - classes
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
          description: ''
  /api/classes/{classroom_pk}/assignments/{id}/submit/:
    post:
      operationId: classes_assignments_submit_create
      description: Fail closed with 403 when classroom exists but the user is not
        a member (no silent empty lists).
      parameters:
      - in: path
        name: classroom_pk
        schema:
          type: integer
        required: true
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - classes
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Assignment'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Assignment'
          application/json:
            schema:
              $ref: '#/components/schemas/Assignment'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
          description: ''
  /api/classes/{classroom_pk}/comments/:
    get:
      operationId: classes_comments_retrieve
      description: |-
        Threaded comments on announcements or classwork.
        GET: ?target_type=post|assignment&target_id=<pk>
        POST: { target_type, target_id, content, parent? }
      parameters:
      - in: path
        name: classroom_pk
        schema:
          type: integer
        required: true
      tags:
      - classes
      responses:
        '200':
          description: No response body
    post:
      operationId: classes_comments_create
      description: |-
        Threaded comments on announcements or classwork.
        GET: ?target_type=post|assignment&target_id=<pk>
        POST: { target_type, target_id, content, parent? }
      parameters:
      - in: path
        name: classroom_pk
        schema:
          type: integer
        required: true
      tags:
      - classes
      responses:
        '200':
          description: No response body
  /api/classes/{classroom_pk}/posts/:
    get:
      operationId: classes_posts_list
      description: Fail closed with 403 when classroom exists but the user is not
        a member (no silent empty lists).
      parameters:
      - in: path
        name: classroom_pk
        schema:
          type: integer
        required: true
      tags:
      - classes
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClassPost'
          description: ''
    post:
      operationId: classes_posts_create
      description: Fail closed with 403 when classroom exists but the user is not
        a member (no silent empty lists).
      parameters:
      - in: path
        name: classroom_pk
        schema:
          type: integer
        required: true
      tags:
      - classes
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassPost'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ClassPost'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ClassPost'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassPost'
          description: ''
  /api/classes/{classroom_pk}/posts/{id}/:
    get:
      operationId: classes_posts_retrieve
      description: Fail closed with 403 when classroom exists but the user is not
        a member (no silent empty lists).
      parameters:
      - in: path
        name: classroom_pk
        schema:
          type: integer
        required: true
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - classes
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassPost'
          description: ''
    patch:
      operationId: classes_posts_partial_update
      description: Fail closed with 403 when classroom exists but the user is not
        a member (no silent empty lists).
      parameters:
      - in: path
        name: classroom_pk
        schema:
          type: integer
        required: true
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - classes
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedClassPost'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedClassPost'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedClassPost'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassPost'
          description: ''
    delete:
      operationId: classes_posts_destroy
      description: Fail closed with 403 when classroom exists but the user is not
        a member (no silent empty lists).
      parameters:
      - in: path
        name: classroom_pk
        schema:
